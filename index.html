<!DOCTYPE html>
<html>
<head>
  <title>PASSAGEN LAB 01</title>

  <style>
    body {
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      padding-top: 20%;
      opacity: 0;
      transition: opacity 2s;
    }

    a {
      color: white;
      text-decoration: none;
      display: block;
      margin: 10px;
      opacity: 0.6;
    }

    a:hover {
      opacity: 1;
    }
  </style>
</head>

<body onload="document.body.style.opacity='1'">

<video autoplay muted loop id="bgvideo" style="
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
object-fit: cover;
z-index: -1;
opacity: 0.4;
">
  <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">

<h1>No recuerdo todo.</h1>
<p>Pero algo insiste.</p>

<br><br>

<a href="voz.html" onclick="localStorage.setItem('last','voz')">una voz</a>
<a href="imagen.html" onclick="localStorage.setItem('last','imagen')">una imagen</a>
<a href="sensacion.html" onclick="localStorage.setItem('last','sensacion')">una sensación</a>

<script>
  const choice = localStorage.getItem("choice");

  if (choice === "voz") {
    document.body.innerHTML += "<p>La voz vuelve.</p>";
  }

  if (choice === "imagen") {
    document.body.innerHTML += "<p>La imagen persiste.</p>";
  }

  if (choice === "sensacion") {
    document.body.innerHTML += "<p>La sensación no se va.</p>";
  }
</script>

<script>
  let visits = localStorage.getItem("visits") || 0;
  visits++;
  localStorage.setItem("visits", visits);
</script>

<script>
  const visitsCount = localStorage.getItem("visits");

  if (visitsCount > 2) {
    document.body.style.opacity = 0.7;
  }

  if (visitsCount > 4) {
    document.body.style.opacity = 0.4;
  }

  if (visitsCount > 6) {
    document.body.innerHTML = "<h1>Ya no es lo mismo.</h1>";
  }
</script>

<script>
  const last = localStorage.getItem("last");

  if (last === "voz") {
    document.body.innerHTML += "<p>No deberías haber vuelto.</p>";
  }

  if (last === "imagen") {
    document.body.innerHTML += "<p>La imagen te sigue.</p>";
  }

  if (last === "sensacion") {
    document.body.innerHTML += "<p>No podés salir de esto.</p>";
  }
</script>

<script>
  const visits = localStorage.getItem("visits") || 0;

  if (visits > 3) {
    document.body.style.filter = "blur(2px)";
  }

  if (visits > 5) {
    document.body.style.filter = "blur(4px)";
  }

  if (visits > 7) {
    document.body.style.filter = "blur(8px)";
  }
</script>

<audio id="bg" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/10/25/audio_9460f9b4b3.mp3?filename=dark-ambient-113561.mp3" type="audio/mpeg">
</audio>

<script>
  document.addEventListener("click", () => {
    const audio = document.getElementById("bg");
    audio.volume = 0.2;
    audio.play();
  });
</script>

</body>
</html>
