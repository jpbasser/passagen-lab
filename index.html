<!DOCTYPE html>
<html>
<head>
  <title>PASSAGEN LAB 02</title>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    section {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      opacity: 0;
      transform: translateY(50px);
      transition: all 1s ease;
    }

    section.active {
      opacity: 1;
      transform: translateY(0);
    }

    #video-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
      opacity: 0.2;
    }

    .glitch {
      animation: glitch 0.3s infinite;
    }

    @keyframes glitch {
      0% { transform: translate(0); }
      25% { transform: translate(-2px, 2px); }
      50% { transform: translate(2px, -2px); }
      75% { transform: translate(-1px, 1px); }
      100% { transform: translate(0); }
    }
  </style>
</head>

<body>

<video id="video-bg" autoplay muted loop>
  <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
</video>

<section>no recuerdo todo</section>
<section>pero algo insiste</section>
<section>no sé si esto pasó</section>
<section class="glitch">o lo estoy inventando</section>
<section>esto no debería estar acá</section>
<section id="final">ya no es lo mismo</section>

<script>
  const sections = document.querySelectorAll("section");

  window.addEventListener("scroll", () => {
    const trigger = window.innerHeight * 0.8;

    sections.forEach(sec => {
      const top = sec.getBoundingClientRect().top;

      if (top < trigger) {
        sec.classList.add("active");
      }
    });
  });
</script>

</body>
</html>
