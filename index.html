<!DOCTYPE html>
<html>
<head>
  <title>PASSAGEN LAB 01</title>

  <style>
    body {
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      padding-top: 20%;
      opacity: 0;
      transition: opacity 2s;
    }

    a {
      color: white;
      text-decoration: none;
      display: block;
      margin: 10px;
      opacity: 0.6;
    }

    a:hover {
      opacity: 1;
    }
  </style>
</head>

<body onload="document.body.style.opacity='1'">

  <h1>No recuerdo todo.</h1>
  <p>Pero algo insiste.</p>

  <br><br>

  <a href="voz.html">una voz</a>
  <a href="imagen.html">una imagen</a>
  <a href="sensacion.html">una sensación</a>

  <audio autoplay loop>
  <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9b1c0c.mp3" type="audio/mpeg">
</audio>

  <script>
  const choice = localStorage.getItem("choice");

  if (choice === "voz") {
    document.body.innerHTML += "<p>La voz vuelve.</p>";
  }

  if (choice === "imagen") {
    document.body.innerHTML += "<p>La imagen persiste.</p>";
  }

  if (choice === "sensacion") {
    document.body.innerHTML += "<p>La sensación no se va.</p>";
  }
</script>

  <script>
  let visits = localStorage.getItem("visits") || 0;
  visits++;
  localStorage.setItem("visits", visits);
</script>

</body>
</html>
